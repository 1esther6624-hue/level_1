<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>링크태그</title>
</head>
<body>
    <h1>링크태그</h1>
    <h2>절대경로</h2>
    <p>http://로 시작하는 실제 웹 서비스 주소</p>
    <a href="http://google.com" target="_blank">구글 바로가기</a>
    <a href="https://www.naver.com/" target="_blank">네이버 바로가기</a>
    <a href="https://www.apple.com/kr/" target="_blank">애플 바로가기</a>
    <!-- 네이버 쇼핑탭 클론코딩 -->
    <div id="shopping_wrap">
        <!-- 1. 쇼핑 제목 탭 -->
        <div class="title_controls_wrap">
            <div class="title">
                <a href="#">쇼핑</a><img src="" alt="">
                <a href="#">맨즈</a><img src="" alt="">
                <a href="#">브랜드샵</a><img src="" alt="">
                <a href="#" class="active">MY추천</a><img src="" alt="">
                <a href="#">추천핫딜</a><img src="" alt="">
                <a href="#">쇼핑라이브</a>
            </div>
            <div class="controls">
                <em class="current_page">1</em>
                <span class="total_page">/12</span>
                <a href="#" class="prev_btn"><img src="" alt="이전상품보기"></a>
                <a href="#" class="next_btn"><img src="" alt="다음상품보기"></a>
            </div>
        </div>
        <!-- 2. 쇼핑 내용(광고, 주문, 추천태그, 상품목록) -->
        <div class="container">
            <div class="side_bar">
                <div class="advertising">
                    <a href="#" target="_blank"><em>쿠팡</em></a>
                    <a href="#" target="_blank">G마켓</a>
                    <a href="#" target="_blank">옥션</a>
                    <a href="#" target="_blank">11번가</a>
                    <a href="#" target="_blank">올리브영</a>
                    <a href="#" target="_blank">SSG닷컴</a>
                    <a href="#" target="_blank">하프클럽</a>
                    <a href="#" target="_blank">이마트몰</a>
                    <a href="#" target="_blank">GS SHOP</a>
                    <a href="#" target="_blank">패션플러스</a>
                </div>
                <div class="user_order_cart">
                    <a href="#" class="order" target="_blank">주문배송<img src="" alt="3"></a>
                    <a href="#" class="cart" target="_blank">장바구니<img src="" alt="1"></a>
                </div>
                <div class="recommend_list">
                    <a href="#"class="active">#패션잡화</a>
                    <a href="#">#생활/건강</a>
                    <a href="#">#디지털/가전</a>
                    <a href="#">#화장품/미용</a>
                    <a href="#">#식품</a>
                    <a href="#">#패션의류</a>
                </div>
            </div><!-- e: side_bar -->
            <div class="right_contents">
                <a href="#" class="product">
                    <p class="photo"><img src="" alt=""></p>
                    <p class="msg">프랑스 명품 캐리어</p>
                    <h2>멜시 프레너리 승무원 기내 반입 일본 여행 1인용</h2>
                    <div class="review_score_wrap">
                        <p class="score"><img src="" alt="별점">4.93</p>
                        <p class="review">리뷰 81</p>
                    </div>
                </a><!-- *8 -->
            </div><!-- e: right_contents -->
        </div>
        <!-- 3. 내용 더보기 -->
        <div class="more_wrap">
            <div class="center">
                <a href="#" class="prev_btn"><img src="" alt="이전상품보기"></a>
                <div class="more_page">
                    <em>MY추천</em><span>더보기</span>
                    <em class="current_page">1</em>
                    <span class="total_page">/12</span>
                </div>
                <a href="#" class="next_btn"><img src="" alt="다음상품보기"></a>
            </div>
            <a href="#" class="ad_btn">AD</a>
        </div>
    </div><!-- e: 전체 shopping_wrap -->
</body>
</html>
